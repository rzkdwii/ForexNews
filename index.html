<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex News Dashboard</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f0b90b;--green:#3fb950;--red:#f85149;--blue:#58a6ff;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;padding:20px;max-width:1100px;margin:0 auto}
  h1{font-size:22px;margin-bottom:4px} h2{font-size:15px;margin-bottom:12px;color:var(--accent)}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
  input,button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px}
  input{flex:1;min-width:200px}
  button{cursor:pointer;background:var(--accent);color:#000;font-weight:600;border:none} button:hover{opacity:.9}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{background:var(--card);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer}
  .chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:18px}
  .inst-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .inst{background:var(--bg);border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
  .inst.active{background:var(--blue);color:#000;border-color:var(--blue)}
  .gauge-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .bias{font-size:26px;font-weight:700}
  .bias.pos{color:var(--green)} .bias.neg{color:var(--red)} .bias.neu{color:var(--muted)}
  .bar{flex:1;min-width:200px;height:14px;border-radius:8px;background:linear-gradient(90deg,var(--red),#444,var(--green));position:relative}
  .bar .needle{position:absolute;top:-4px;width:4px;height:22px;background:#fff;border-radius:2px;transform:translateX(-50%);transition:.4s}
  .counts{display:flex;gap:16px;font-size:13px;color:var(--muted);margin-top:10px} .counts b{color:var(--text)}
  .drivers{margin-top:12px;font-size:13px;color:var(--muted);line-height:1.6}
  .tag{display:inline-block;padding:1px 7px;border-radius:4px;margin:2px;font-size:12px}
  .tag.pos{background:rgba(63,185,80,.15);color:var(--green)} .tag.neg{background:rgba(248,81,73,.15);color:var(--red)}
  .cal-item{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
  .cal-item:last-child{border:none}
  .cal-time{min-width:120px;color:var(--blue);font-weight:600} .cal-name{flex:1}
  .imp{padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .imp.high{background:rgba(248,81,73,.15);color:var(--red)} .imp.med{background:rgba(240,185,11,.15);color:var(--accent)} .imp.low{background:rgba(139,148,158,.15);color:var(--muted)}
  .cd{color:var(--muted);font-size:12px;min-width:90px;text-align:right}
  .news{display:grid;gap:12px}
  .item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;gap:14px;transition:.15s}
  .item:hover{border-color:var(--accent)}
  .item img{width:90px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0}
  .item .body{flex:1;min-width:0}
  .item h3{font-size:15px;margin-bottom:6px;line-height:1.3}
  .item h3 a{color:var(--text);text-decoration:none} .item h3 a:hover{color:var(--accent)}
  .item p{color:var(--muted);font-size:13px;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta{display:flex;gap:10px;font-size:12px;color:var(--muted);align-items:center;flex-wrap:wrap}
  .src{color:var(--blue);font-weight:600}
  .sent{padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px}
  .sent.pos{background:rgba(63,185,80,.15);color:var(--green)} .sent.neg{background:rgba(248,81,73,.15);color:var(--red)} .sent.neu{background:rgba(139,148,158,.15);color:var(--muted)}
  .status{text-align:center;padding:40px;color:var(--muted)} .err{color:var(--red)}
</style>
</head>
<body>
  <h1>📈 Forex News Dashboard</h1>
  <div class="sub">Berita, bias per-instrumen & jadwal rilis — powered by Finnhub</div>

  <div class="panel">
    <h2>🎯 Bias Pasar per Instrumen</h2>
    <div class="inst-tabs" id="instTabs"></div>
    <div class="gauge-wrap">
      <div class="bias neu" id="biasLabel">—</div>
      <div class="bar"><div class="needle" id="needle" style="left:50%"></div></div>
    </div>
    <div class="counts">
      <span>Bullish: <b id="cPos" style="color:var(--green)">0</b></span>
      <span>Bearish: <b id="cNeg" style="color:var(--red)">0</b></span>
      <span>Relevan: <b id="cRel">0</b> berita</span>
    </div>
    <div class="drivers" id="drivers"></div>
  </div>

  <div class="panel">
    <h2>🗓️ Jadwal Rilis Berita Penting (mendatang)</h2>
    <div id="calendar"><div class="status">Memuat jadwal...</div></div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px" id="calNote"></div>
  </div>

  <div class="controls">
    <input id="search" type="text" placeholder="Filter judul berita..." oninput="render()">
    <button onclick="loadNews()">🔄 Muat Ulang</button>
  </div>
  <div class="filters" id="catFilters">
    <span class="chip active" data-cat="forex">Forex</span>
    <span class="chip" data-cat="general">General</span>
    <span class="chip" data-cat="crypto">Crypto</span>
    <span class="chip" data-cat="merger">Merger</span>
  </div>
  <div class="news" id="news"><div class="status">Memuat berita...</div></div>

<script>
const API_KEY='d8j1dt1r01qin2u15ac0d8j1dt1r01qin2u15acg';
let category='forex', allNews=[], curInst='XAU';

/* Definisi instrumen: keyword identifikasi + arah safe-haven */
const INSTRUMENTS={
  XAU:{label:'🥇 XAU/Gold', match:['gold','xau','xauusd','bullion','precious metal'], havenFlip:true,
       note:'Gold sering naik saat risk-off / USD lemah / dovish Fed.'},
  BTC:{label:'₿ BTC', match:['bitcoin','btc','crypto','ethereum','digital asset'], havenFlip:false,
       note:'BTC cenderung risk-on; naik saat sentimen positif / likuiditas longgar.'},
  NDX:{label:'📊 Nasdaq', match:['nasdaq','tech stock','equities','s&p','stock market','wall street','ndx'], havenFlip:false,
       note:'Indeks saham risk-on; turun saat hawkish/yield naik, naik saat dovish.'},
  USD:{label:'💵 USD/DXY', match:['dollar','usd','dxy','greenback','federal reserve','fed'], havenFlip:false,
       note:'USD menguat saat hawkish Fed / risk-off / data AS kuat.'},
  EUR:{label:'🇪🇺 EUR', match:['euro','eur','eurusd','ecb','eurozone'], havenFlip:false,
       note:'EUR dipengaruhi ECB & data zona euro relatif terhadap USD.'},
};

const POS=['surge','rally','gain','rise','jump','bullish','strong','boost','climb','soar','beat','record high','optimism','upbeat','demand','inflow'];
const NEG=['fall','drop','plunge','decline','bearish','weak','slump','crash','fear','loss','cut','recession','sell-off','selloff','tumble','slowdown','outflow','miss'];
// kata makro yang berarti risk-off (naikkan gold, turunkan saham/btc)
const RISKOFF=['risk-off','safe haven','fear','war','conflict','recession','crisis','crash','geopolitical'];
const HAWKISH=['hawkish','rate hike','higher rates','tightening']; // kuatkan USD, tekan gold/saham
const DOVISH=['dovish','rate cut','lower rates','easing']; // lemahkan USD, angkat gold/saham

function relevant(n, inst){
  const t=((n.headline||'')+' '+(n.summary||'')).toLowerCase();
  return INSTRUMENTS[inst].match.some(k=>t.includes(k));
}

function scoreFor(n, inst){
  const t=((n.headline||'')+' '+(n.summary||'')).toLowerCase();
  let s=0; const hits=[];
  POS.forEach(w=>{if(t.includes(w)){s++;hits.push([w,'pos']);}});
  NEG.forEach(w=>{if(t.includes(w)){s--;hits.push([w,'neg']);}});
  // penyesuaian makro per instrumen
  const cfg=INSTRUMENTS[inst];
  RISKOFF.forEach(w=>{if(t.includes(w)){ s+=cfg.havenFlip?1:-1; hits.push([w,cfg.havenFlip?'pos':'neg']);}});
  if(inst==='USD'){
    HAWKISH.forEach(w=>{if(t.includes(w)){s++;hits.push([w,'pos']);}});
    DOVISH.forEach(w=>{if(t.includes(w)){s--;hits.push([w,'neg']);}});
  } else { // gold/saham/btc: hawkish menekan, dovish mengangkat
    HAWKISH.forEach(w=>{if(t.includes(w)){s--;hits.push([w,'neg']);}});
    DOVISH.forEach(w=>{if(t.includes(w)){s++;hits.push([w,'pos']);}});
  }
  return {s,label:s>0?'pos':s<0?'neg':'neu',hits};
}
const sentLabel={pos:'Bullish',neg:'Bearish',neu:'Netral'};

function buildTabs(){
  document.getElementById('instTabs').innerHTML=Object.entries(INSTRUMENTS)
    .map(([k,v])=>`<span class="inst ${k===curInst?'active':''}" data-inst="${k}">${v.label}</span>`).join('');
}
document.addEventListener('click',e=>{
  if(e.target.classList.contains('inst')){ curInst=e.target.dataset.inst; buildTabs(); updateBias(); }
  if(e.target.classList.contains('chip')){
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    e.target.classList.add('active'); category=e.target.dataset.cat; loadNews();
  }
});

function updateBias(){
  const rel=allNews.filter(n=>relevant(n,curInst));
  let pos=0,neg=0; const dc={};
  rel.forEach(n=>{const r=scoreFor(n,curInst); if(r.label==='pos')pos++; else if(r.label==='neg')neg++;
    r.hits.forEach(([w,p])=>{dc[w]=dc[w]||{n:0,p};dc[w].n++;});});
  document.getElementById('cPos').textContent=pos;
  document.getElementById('cNeg').textContent=neg;
  document.getElementById('cRel').textContent=rel.length;
  const total=pos+neg||1, ratio=(pos-neg)/total, pct=50+ratio*50;
  document.getElementById('needle').style.left=pct+'%';
  const lbl=document.getElementById('biasLabel');
  const bias=rel.length===0?'neu':ratio>0.1?'pos':ratio<-0.1?'neg':'neu';
  lbl.className='bias '+bias;
  lbl.textContent=rel.length===0?'Data minim':`${sentLabel[bias]} ${ratio>0?'+':''}${(ratio*100).toFixed(0)}%`;
  const top=Object.entries(dc).sort((a,b)=>b[1].n-a[1].n).slice(0,8);
  document.getElementById('drivers').innerHTML=
    `<b>${INSTRUMENTS[curInst].label}</b> — ${INSTRUMENTS[curInst].note}<br>`+
    'Pendorong: '+(top.length?top.map(([w,o])=>`<span class="tag ${o.p}">${w} (${o.n})</span>`).join(''):'belum ada berita relevan di kategori ini')+
    (rel.length<3?'<br><span style="color:var(--accent)">⚠ Sampel kecil — ganti kategori ke "general" atau "forex" untuk lebih banyak berita.</span>':'');
}

async function loadNews(){
  const box=document.getElementById('news'); box.innerHTML='<div class="status">Memuat...</div>';
  try{
    const res=await fetch(`https://finnhub.io/api/v1/news?category=${category}&token=${API_KEY}`);
    if(!res.ok) throw new Error('HTTP '+res.status+' — cek key/limit.');
    allNews=await res.json();
    if(!Array.isArray(allNews)||!allNews.length){box.innerHTML='<div class="status">Tidak ada berita.</div>';return;}
    render();
  }catch(err){box.innerHTML=`<div class="status err">Error: ${err.message}</div>`;}
}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const box=document.getElementById('news');
  const items=allNews.filter(n=>(n.headline||'').toLowerCase().includes(q));
  updateBias();
  if(!items.length){box.innerHTML='<div class="status">Tidak ada hasil.</div>';return;}
  box.innerHTML=items.map(n=>{
    const r=scoreFor(n,curInst);
    const date=new Date(n.datetime*1000).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const img=n.image?`<img src="${n.image}" onerror="this.style.display='none'">`:'';
    const relMark=relevant(n,curInst)?' • '+INSTRUMENTS[curInst].label:'';
    return `<div class="item">${img}<div class="body">
      <h3><a href="${n.url}" target="_blank">${n.headline||'(tanpa judul)'}</a></h3>
      <p>${n.summary||''}</p>
      <div class="meta"><span class="src">${n.source||''}</span><span>${date}${relMark}</span>
      <span class="sent ${r.label}">${sentLabel[r.label]}</span></div>
    </div></div>`;
  }).join('');
}

/* Calendar (sama: coba Finnhub, fallback jadwal rutin) */
async function loadCalendar(){
  try{
    const today=new Date(),to=new Date();to.setDate(today.getDate()+14);
    const f=d=>d.toISOString().slice(0,10);
    const res=await fetch(`https://finnhub.io/api/v1/calendar/economic?from=${f(today)}&to=${f(to)}&token=${API_KEY}`);
    if(res.ok){const data=await res.json();const ev=(data.economicCalendar||data.result||[]).filter(e=>e.country==='US'||e.impact);
      if(ev.length){renderCal(ev.slice(0,15).map(e=>({time:new Date(e.time||e.date),name:e.event,imp:(e.impact||'low').toLowerCase()})));
        document.getElementById('calNote').textContent='Sumber: Finnhub (live).';return;}}
    throw 0;
  }catch(e){renderCal(fallback());
    document.getElementById('calNote').textContent='Kalender Finnhub butuh paid plan → jadwal rutin perkiraan (WIB). Verifikasi jam pasti di forexfactory.com.';}
}
function fallback(){const now=new Date(),o=[];
  o.push({name:'Non-Farm Payrolls (NFP) 🇺🇸',imp:'high',time:firstFri(now,19,30)});
  o.push({name:'US CPI (Inflasi) 🇺🇸',imp:'high',time:nth(now,12,19,30)});
  o.push({name:'FOMC Rate Decision 🇺🇸 (cek resmi)',imp:'high',time:nth(now,18,1,0)});
  o.push({name:'US Core PCE 🇺🇸',imp:'med',time:nth(now,28,19,30)});
  o.push({name:'ECB Rate Decision 🇪🇺 (cek resmi)',imp:'high',time:nth(now,15,19,15)});
  o.push({name:'US ISM PMI 🇺🇸',imp:'med',time:nth(now,1,22,0)});
  return o.filter(e=>e.time>now).sort((a,b)=>a.time-b.time);}
function firstFri(r,h,m){let d=new Date(r.getFullYear(),r.getMonth(),1,h,m);while(d.getDay()!==5)d.setDate(d.getDate()+1);
  if(d<r){d=new Date(r.getFullYear(),r.getMonth()+1,1,h,m);while(d.getDay()!==5)d.setDate(d.getDate()+1);}return d;}
function nth(r,day,h,m){let d=new Date(r.getFullYear(),r.getMonth(),day,h,m);if(d<r)d=new Date(r.getFullYear(),r.getMonth()+1,day,h,m);return d;}
function renderCal(events){const box=document.getElementById('calendar');
  if(!events.length){box.innerHTML='<div class="status">Tidak ada event.</div>';return;}
  const now=new Date();
  box.innerHTML=events.map(e=>{const t=e.time instanceof Date?e.time:new Date(e.time);
    const when=t.toLocaleString('id-ID',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const diff=t-now,days=Math.floor(diff/86400000),hrs=Math.floor((diff%86400000)/3600000);
    const cd=days>0?`${days}h ${hrs}j lagi`:`${hrs}j lagi`;
    const ic=e.imp==='high'?'high':(e.imp==='medium'||e.imp==='med')?'med':'low';
    const it=ic==='high'?'HIGH':ic==='med'?'MED':'LOW';
    return `<div class="cal-item"><span class="cal-time">${when}</span><span class="cal-name">${e.name}</span><span class="imp ${ic}">${it}</span><span class="cd">${cd}</span></div>`;}).join('');}

buildTabs();
window.addEventListener('DOMContentLoaded',()=>{loadNews();loadCalendar();});
</script>
</body>
</html>
